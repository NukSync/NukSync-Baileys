name: Auto Extract ZIP

on:
  push

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract ZIP
        run: |
          unzip -o Baileys-main.zip
          rm -f Baileys-main.zip

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .
          git diff --staged --quiet || git commit -m "Extract Baileys source"
          git push
