name: Auto Extract ZIP

on:
  push

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          unzip -o Baileys-main.zip
          rm -f Baileys-main.zip

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Extract Baileys source" || echo "No changes"
          git push
